<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CTF Writeups Admin</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-2: #eef3f0;
      --text: #1f2933;
      --muted: #61707f;
      --line: #d9e0e6;
      --primary: #176b87;
      --primary-2: #0f556b;
      --accent: #6b5b95;
      --danger: #a43f3f;
      --shadow: 0 18px 48px rgba(31, 41, 51, 0.09);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-width: 320px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    .sidebar {
      background: #17212b;
      color: #f8fafc;
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: #d5f4ef;
      color: #17212b;
      border-radius: 8px;
      font-weight: 800;
    }

    .brand h1 {
      font-size: 17px;
      line-height: 1.2;
      margin: 0;
      letter-spacing: 0;
    }

    .brand p {
      color: #aeb9c4;
      margin: 3px 0 0;
      font-size: 13px;
    }

    .stats {
      display: grid;
      gap: 10px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 8px;
      padding: 12px;
    }

    .stat span {
      display: block;
      color: #aeb9c4;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat strong {
      font-size: 22px;
    }

    .writeup-list {
      display: grid;
      gap: 8px;
      overflow: auto;
      padding-right: 2px;
    }

    .list-button {
      width: 100%;
      text-align: left;
      color: #f8fafc;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .list-button:hover,
    .list-button.active {
      background: rgba(213, 244, 239, 0.12);
      border-color: rgba(213, 244, 239, 0.45);
    }

    .list-button strong,
    .list-button span {
      overflow-wrap: anywhere;
    }

    .list-button strong {
      font-size: 14px;
    }

    .list-button span {
      color: #aeb9c4;
      font-size: 12px;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
    }

    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 3;
    }

    .topbar h2 {
      margin: 0;
      font-size: 21px;
      letter-spacing: 0;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      min-height: 38px;
      border-radius: 8px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #e8edf2;
      color: var(--text);
      border: 1px solid transparent;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn.primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: var(--primary-2);
    }

    .btn.ghost {
      background: transparent;
      border-color: var(--line);
    }

    .btn.danger {
      background: #f7e8e8;
      color: var(--danger);
    }

    .content {
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(360px, 0.94fr) minmax(360px, 1.06fr);
      gap: 20px;
      align-items: start;
    }

    .workspace {
      display: grid;
      gap: 16px;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #fbfcfd;
    }

    .section-header h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .section-body {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    label {
      font-size: 12px;
      font-weight: 800;
      color: #405160;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      padding: 10px 11px;
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23, 107, 135, 0.14);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      background: #edf1f4;
      padding: 6px;
      border-radius: 8px;
    }

    .segmented button {
      min-height: 34px;
      border-radius: 6px;
      background: transparent;
      color: #405160;
      font-weight: 800;
      font-size: 13px;
    }

    .segmented button.active {
      background: #ffffff;
      color: var(--primary);
      box-shadow: 0 1px 5px rgba(31, 41, 51, 0.12);
    }

    .preview-wrap {
      position: sticky;
      top: 96px;
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .preview {
      height: calc(100vh - 132px);
      min-height: 560px;
      background: #121820;
      color: #e8eef5;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #263241;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .preview-bar {
      min-height: 44px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid #263241;
      background: #17212b;
    }

    .preview-bar strong {
      font-size: 13px;
    }

    .status {
      color: #b6c2cf;
      font-size: 12px;
      min-height: 17px;
      overflow-wrap: anywhere;
    }

    pre {
      margin: 0;
      padding: 18px;
      overflow: auto;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
    }

    .mini-table {
      display: grid;
      gap: 8px;
    }

    .row-pair {
      display: grid;
      grid-template-columns: minmax(120px, 0.6fr) minmax(160px, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .row-screenshot {
      display: grid;
      grid-template-columns: minmax(130px, 0.7fr) minmax(150px, 1fr) minmax(150px, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #edf1f4;
      color: var(--danger);
      font-weight: 900;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #17212b;
      color: #ffffff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: 0.18s ease;
      max-width: min(360px, calc(100vw - 40px));
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1060px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
      }

      .content {
        grid-template-columns: 1fr;
      }

      .preview-wrap {
        position: static;
      }

      .preview {
        height: 620px;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: stretch;
      }

      .btn {
        flex: 1 1 130px;
      }

      .content {
        padding: 16px;
      }

      .grid-2,
      .row-pair,
      .row-screenshot {
        grid-template-columns: 1fr;
      }

      .segmented {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">CTF</div>
        <div>
          <h1>Writeups Admin</h1>
          <p>Security report builder</p>
        </div>
      </div>

      <div class="stats" aria-live="polite">
        <div class="stat">
          <span>Total drafts</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="stat">
          <span>Current path</span>
          <strong id="currentPath">-</strong>
        </div>
      </div>

      <div class="writeup-list" id="writeupList"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2>Admin Panel</h2>
          <p id="recordTitle">New writeup</p>
        </div>
        <div class="actions">
          <button class="btn ghost" id="newBtn" type="button">New</button>
          <button class="btn" id="copyBtn" type="button">Copy Markdown</button>
          <button class="btn" id="downloadBtn" type="button">Download README</button>
          <button class="btn primary" id="saveBtn" type="button">Save Draft</button>
        </div>
      </header>

      <div class="content">
        <form class="workspace" id="writeupForm">
          <section class="section">
            <div class="section-header">
              <h3>Challenge Details</h3>
            </div>
            <div class="section-body">
              <div class="segmented" id="platformTabs">
                <button type="button" data-platform="TryHackMe" class="active">TryHackMe</button>
                <button type="button" data-platform="Hack The Box">Hack The Box</button>
                <button type="button" data-platform="picoCTF">picoCTF</button>
                <button type="button" data-platform="Other">Other</button>
              </div>

              <div class="grid-2">
                <div class="field">
                  <label for="name">Room / Machine / Challenge</label>
                  <input id="name" name="name" placeholder="Blue" required>
                </div>
                <div class="field">
                  <label for="slug">Folder Slug</label>
                  <input id="slug" name="slug" placeholder="blue">
                </div>
              </div>

              <div class="grid-2">
                <div class="field">
                  <label for="difficulty">Difficulty</label>
                  <select id="difficulty" name="difficulty">
                    <option>Easy</option>
                    <option>Medium</option>
                    <option>Hard</option>
                    <option>Insane</option>
                  </select>
                </div>
                <div class="field">
                  <label for="category">Category</label>
                  <select id="category" name="category">
                    <option>Web</option>
                    <option>Linux</option>
                    <option>Windows</option>
                    <option>Active Directory</option>
                    <option>Forensics</option>
                    <option>Crypto</option>
                    <option>Reverse Engineering</option>
                    <option>Misc</option>
                  </select>
                </div>
              </div>

              <div class="grid-2">
                <div class="field">
                  <label for="dateCompleted">Date Completed</label>
                  <input id="dateCompleted" name="dateCompleted" type="date">
                </div>
                <div class="field">
                  <label for="target">Target / URL</label>
                  <input id="target" name="target" placeholder="10.10.10.10">
                </div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section-header">
              <h3>Report Content</h3>
            </div>
            <div class="section-body">
              <div class="field">
                <label for="objective">Objective</label>
                <textarea id="objective" name="objective" placeholder="Enumerate exposed services, identify the primary attack surface, gain initial access, and document defensive takeaways."></textarea>
              </div>
              <div class="field">
                <label for="labSetup">Lab Setup</label>
                <textarea id="labSetup" name="labSetup" placeholder="- Attacker Machine: Kali Linux&#10;- Target: CTF-provided machine&#10;- Network: VPN"></textarea>
              </div>
              <div class="field">
                <label for="recon">Reconnaissance</label>
                <textarea id="recon" name="recon" placeholder="Service enumeration identified exposed ports and the main application surface."></textarea>
              </div>
              <div class="field">
                <label for="exploitation">Exploitation</label>
                <textarea id="exploitation" name="exploitation" placeholder="The identified issue allowed controlled execution through the exposed service."></textarea>
              </div>
              <div class="field">
                <label for="initialAccess">Initial Access</label>
                <textarea id="initialAccess" name="initialAccess" placeholder="Initial shell access was obtained as a low-privileged user."></textarea>
              </div>
              <div class="field">
                <label for="privEsc">Privilege Escalation</label>
                <textarea id="privEsc" name="privEsc" placeholder="Local enumeration revealed a misconfiguration that allowed privilege escalation."></textarea>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section-header">
              <h3>Commands And Evidence</h3>
            </div>
            <div class="section-body">
              <div class="field">
                <label for="commands">Commands</label>
                <textarea id="commands" name="commands" placeholder="nmap -sC -sV -oN nmap.txt <target-ip>&#10;sudo -l"></textarea>
              </div>
              <div class="field">
                <label for="findings">Key Findings</label>
                <textarea id="findings" name="findings" placeholder="- SSH and HTTP were exposed&#10;- An admin panel was discovered&#10;- Sudo permissions were misconfigured"></textarea>
              </div>
              <div class="grid-2">
                <div class="field">
                  <label for="userFlag">User Flag</label>
                  <input id="userFlag" name="userFlag" placeholder="[redacted]">
                </div>
                <div class="field">
                  <label for="rootFlag">Root Flag</label>
                  <input id="rootFlag" name="rootFlag" placeholder="[redacted]">
                </div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section-header">
              <h3>Tools Used</h3>
              <button class="btn ghost" id="addToolBtn" type="button">Add Tool</button>
            </div>
            <div class="section-body">
              <div class="mini-table" id="toolsList"></div>
            </div>
          </section>

          <section class="section">
            <div class="section-header">
              <h3>Screenshots</h3>
              <button class="btn ghost" id="addScreenshotBtn" type="button">Add Screenshot</button>
            </div>
            <div class="section-body">
              <div class="mini-table" id="screenshotsList"></div>
            </div>
          </section>

          <section class="section">
            <div class="section-header">
              <h3>Closeout</h3>
            </div>
            <div class="section-body">
              <div class="field">
                <label for="lessons">Lessons Learned</label>
                <textarea id="lessons" name="lessons" placeholder="- Validate each exposed service before exploitation&#10;- Review sudo permissions immediately after shell access"></textarea>
              </div>
              <div class="field">
                <label for="mitigation">Mitigation Advice</label>
                <textarea id="mitigation" name="mitigation" placeholder="- Restrict dangerous sudo permissions&#10;- Keep exposed software updated&#10;- Monitor suspicious shell behavior"></textarea>
              </div>
              <div class="field">
                <label for="references">References</label>
                <textarea id="references" name="references" placeholder="https://gtfobins.github.io/&#10;https://book.hacktricks.xyz/"></textarea>
              </div>
            </div>
          </section>
        </form>

        <section class="preview-wrap">
          <div class="preview">
            <div class="preview-bar">
              <strong>README.md Preview</strong>
              <span class="status" id="saveStatus">Unsaved</span>
            </div>
            <pre id="markdownPreview"></pre>
          </div>
          <button class="btn danger" id="deleteBtn" type="button">Delete Draft</button>
        </section>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const storageKey = "ctf-writeups-admin-records";
    const form = document.querySelector("#writeupForm");
    const preview = document.querySelector("#markdownPreview");
    const platformTabs = document.querySelector("#platformTabs");
    const writeupList = document.querySelector("#writeupList");
    const toolsList = document.querySelector("#toolsList");
    const screenshotsList = document.querySelector("#screenshotsList");
    const totalCount = document.querySelector("#totalCount");
    const currentPath = document.querySelector("#currentPath");
    const recordTitle = document.querySelector("#recordTitle");
    const saveStatus = document.querySelector("#saveStatus");
    const toast = document.querySelector("#toast");

    let records = loadRecords();
    let activeId = null;
    let platform = "TryHackMe";
    let tools = [
      { tool: "Nmap", purpose: "Port scanning and service detection" },
      { tool: "Gobuster", purpose: "Directory brute forcing" },
      { tool: "Burp Suite", purpose: "Web request analysis" }
    ];
    let screenshots = [
      { file: "nmap-scan.png", caption: "Nmap scan results", alt: "Nmap scan results" },
      { file: "web-enumeration.png", caption: "Web enumeration finding", alt: "Web enumeration finding" }
    ];

    const fields = [
      "name",
      "slug",
      "difficulty",
      "category",
      "dateCompleted",
      "target",
      "objective",
      "labSetup",
      "recon",
      "exploitation",
      "initialAccess",
      "privEsc",
      "commands",
      "findings",
      "userFlag",
      "rootFlag",
      "lessons",
      "mitigation",
      "references"
    ];

    function loadRecords() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || [];
      } catch (error) {
        return [];
      }
    }

    function persistRecords() {
      localStorage.setItem(storageKey, JSON.stringify(records));
    }

    function getValue(id) {
      return document.querySelector(`#${id}`).value.trim();
    }

    function setValue(id, value) {
      document.querySelector(`#${id}`).value = value || "";
    }

    function slugify(value) {
      return value
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function platformFolder(value) {
      const folders = {
        "TryHackMe": "tryhackme",
        "Hack The Box": "hackthebox",
        "picoCTF": "picoctf",
        "Other": "other"
      };
      return folders[value] || "other";
    }

    function formatDate(value) {
      if (!value) return "DD Month YYYY";
      const date = new Date(`${value}T00:00:00`);
      return new Intl.DateTimeFormat("en", {
        day: "2-digit",
        month: "long",
        year: "numeric"
      }).format(date);
    }

    function asBullets(value, fallback) {
      const lines = (value || fallback || "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);
      return lines.map((line) => line.startsWith("-") ? line : `- ${line}`).join("\n");
    }

    function codeBlock(value, language) {
      const content = value || "# Add commands or output here";
      return `\`\`\`${language || ""}\n${content}\n\`\`\``;
    }

    function toolTable() {
      const rows = tools
        .filter((item) => item.tool.trim() || item.purpose.trim())
        .map((item) => `| ${item.tool.trim() || "Tool"} | ${item.purpose.trim() || "Purpose"} |`);
      return ["| Tool | Purpose |", "|---|---|", ...rows].join("\n");
    }

    function screenshotMarkdown(items) {
      const rows = items
        .filter((item) => String(item.file || "").trim() || String(item.caption || "").trim() || String(item.alt || "").trim())
        .map((item) => {
          const file = String(item.file || "").trim() || "screenshot.png";
          const alt = String(item.alt || "").trim() || String(item.caption || "").trim() || file;
          const caption = String(item.caption || "").trim();
          const image = `![${alt}](screenshots/${file})`;
          return caption ? `${image}\n\n*${caption}*` : image;
        });

      return rows.length ? rows.join("\n\n") : "Add screenshot files to the `screenshots/` folder, then reference them here.";
    }

    function collectRecord() {
      const data = {};
      fields.forEach((field) => {
        data[field] = getValue(field);
      });

      if (!data.slug) {
        data.slug = slugify(data.name || "new-writeup");
      }

      data.id = activeId || crypto.randomUUID();
      data.platform = platform;
      data.tools = tools.map((item) => ({ ...item }));
      data.screenshots = screenshots.map((item) => ({ ...item }));
      data.updatedAt = new Date().toISOString();
      return data;
    }

    function markdownFromRecord(data) {
      const name = data.name || "Room / Machine Name";
      const slug = data.slug || slugify(name);
      const path = `${platformFolder(data.platform)}/${slug}/README.md`;
      const findings = asBullets(data.findings, "- Add key findings");
      const lessons = asBullets(data.lessons, "- Add lessons learned");
      const mitigation = asBullets(data.mitigation, "- Add mitigation advice");
      const references = asBullets(data.references, "- https://gtfobins.github.io/");
      const labSetup = asBullets(data.labSetup, "- Attacker Machine: Kali Linux\n- Target: CTF-provided machine\n- Network: VPN");
      const screenshotsMd = screenshotMarkdown(Array.isArray(data.screenshots) ? data.screenshots : []);

      return `# ${data.platform}: ${name}

## Overview

**Platform:** ${data.platform}  
**Room/Machine:** ${name}  
**Difficulty:** ${data.difficulty || "Easy"}  
**Category:** ${data.category || "Web"}  
**Date Completed:** ${formatDate(data.dateCompleted)}  
**Target:** ${data.target || "[redacted]"}  
**Repo Path:** \`${path}\`

## Objective

${data.objective || "The objective was to enumerate the target, identify the primary attack surface, gain initial access, and document defensive takeaways."}

## Lab Setup

${labSetup}

## Reconnaissance

${data.recon || "Service enumeration identified the exposed services and helped prioritize the initial attack surface."}

### Commands

${codeBlock(data.commands, "bash")}

### Key Findings

${findings}

## Exploitation

${data.exploitation || "The vulnerability was validated in a controlled lab environment and used to gain initial access."}

## Initial Access

${data.initialAccess || "Initial access was obtained as a low-privileged user. Local enumeration was performed before attempting privilege escalation."}

## Privilege Escalation

${data.privEsc || "Privilege escalation was achieved by identifying and exploiting a local misconfiguration."}

## Flags

Avoid exposing active platform flags if the platform does not allow it.

${codeBlock(`user.txt: ${data.userFlag || "[redacted]"}\nroot.txt: ${data.rootFlag || "[redacted]"}`, "text")}

## Tools Used

${toolTable()}

## Screenshots

${screenshotsMd}

## Lessons Learned

${lessons}

## Mitigation Advice

${mitigation}

## References

${references}
`;
    }

    function renderTools() {
      toolsList.innerHTML = "";
      tools.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "row-screenshot";
        row.innerHTML = `
          <input aria-label="Tool name" value="${escapeAttr(item.tool)}" data-tool-index="${index}" data-tool-field="tool">
          <input aria-label="Tool purpose" value="${escapeAttr(item.purpose)}" data-tool-index="${index}" data-tool-field="purpose">
          <button class="icon-btn" title="Remove tool" type="button" data-remove-tool="${index}">x</button>
        `;
        toolsList.appendChild(row);
      });
    }

    function renderScreenshots() {
      screenshotsList.innerHTML = "";
      screenshots.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "row-pair";
        row.innerHTML = `
          <input aria-label="Screenshot file" placeholder="nmap-scan.png" value="${escapeAttr(item.file)}" data-screenshot-index="${index}" data-screenshot-field="file">
          <input aria-label="Screenshot caption" placeholder="Nmap scan results" value="${escapeAttr(item.caption)}" data-screenshot-index="${index}" data-screenshot-field="caption">
          <input aria-label="Screenshot alt text" placeholder="Nmap scan results" value="${escapeAttr(item.alt)}" data-screenshot-index="${index}" data-screenshot-field="alt">
          <button class="icon-btn" title="Remove screenshot" type="button" data-remove-screenshot="${index}">x</button>
        `;
        screenshotsList.appendChild(row);
      });
    }

    function escapeAttr(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderPreview() {
      const data = collectRecord();
      preview.textContent = markdownFromRecord(data);
      currentPath.textContent = `${platformFolder(data.platform)}/${data.slug || "new-writeup"}`;
      recordTitle.textContent = data.name || "New writeup";
      saveStatus.textContent = activeId ? "Editing draft" : "Unsaved";
    }

    function renderList() {
      writeupList.innerHTML = "";
      totalCount.textContent = records.length;

      if (!records.length) {
        const empty = document.createElement("div");
        empty.className = "list-button";
        empty.innerHTML = "<strong>No drafts yet</strong><span>Save one to pin it here</span>";
        writeupList.appendChild(empty);
        return;
      }

      records
        .slice()
        .sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)))
        .forEach((record) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `list-button${record.id === activeId ? " active" : ""}`;
          button.dataset.recordId = record.id;
          button.innerHTML = `
            <strong>${escapeAttr(record.name || "Untitled writeup")}</strong>
            <span>${escapeAttr(record.platform)} / ${escapeAttr(record.slug || slugify(record.name || "writeup"))}</span>
          `;
          writeupList.appendChild(button);
        });
    }

    function setPlatform(value) {
      platform = value;
      platformTabs.querySelectorAll("button").forEach((button) => {
        button.classList.toggle("active", button.dataset.platform === value);
      });
      renderPreview();
    }

    function loadRecord(record) {
      activeId = record.id;
      platform = record.platform || "TryHackMe";
      tools = Array.isArray(record.tools) && record.tools.length ? record.tools.map((item) => ({ ...item })) : [];
      screenshots = Array.isArray(record.screenshots) ? record.screenshots.map((item) => ({ ...item })) : [];
      fields.forEach((field) => setValue(field, record[field]));
      setPlatform(platform);
      renderTools();
      renderScreenshots();
      renderList();
      renderPreview();
    }

    function resetForm() {
      activeId = null;
      form.reset();
      platform = "TryHackMe";
      tools = [
        { tool: "Nmap", purpose: "Port scanning and service detection" },
        { tool: "Gobuster", purpose: "Directory brute forcing" },
        { tool: "Burp Suite", purpose: "Web request analysis" }
      ];
      screenshots = [
        { file: "nmap-scan.png", caption: "Nmap scan results", alt: "Nmap scan results" },
        { file: "web-enumeration.png", caption: "Web enumeration finding", alt: "Web enumeration finding" }
      ];
      setPlatform(platform);
      renderTools();
      renderScreenshots();
      renderList();
      renderPreview();
    }

    function saveRecord() {
      const record = collectRecord();
      setValue("slug", record.slug);
      const index = records.findIndex((item) => item.id === record.id);
      if (index >= 0) {
        records[index] = record;
      } else {
        records.push(record);
      }
      activeId = record.id;
      persistRecords();
      renderList();
      renderPreview();
      showToast("Draft saved");
    }

    function deleteRecord() {
      if (!activeId) {
        resetForm();
        showToast("Current draft cleared");
        return;
      }
      records = records.filter((record) => record.id !== activeId);
      persistRecords();
      resetForm();
      showToast("Draft deleted");
    }

    async function copyMarkdown() {
      const data = collectRecord();
      const markdown = markdownFromRecord(data);
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(markdown);
      } else {
        const holder = document.createElement("textarea");
        holder.value = markdown;
        holder.style.position = "fixed";
        holder.style.opacity = "0";
        document.body.appendChild(holder);
        holder.select();
        document.execCommand("copy");
        holder.remove();
      }
      showToast("Markdown copied");
    }

    function downloadMarkdown() {
      const data = collectRecord();
      const blob = new Blob([markdownFromRecord(data)], { type: "text/markdown" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "README.md";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
      showToast("README.md downloaded");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    form.addEventListener("input", (event) => {
      if (event.target.id === "name" && !getValue("slug")) {
        setValue("slug", slugify(event.target.value));
      }
      renderPreview();
    });

    platformTabs.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-platform]");
      if (!button) return;
      setPlatform(button.dataset.platform);
    });

    toolsList.addEventListener("input", (event) => {
      const index = Number(event.target.dataset.toolIndex);
      const field = event.target.dataset.toolField;
      if (!Number.isNaN(index) && field) {
        tools[index][field] = event.target.value;
        renderPreview();
      }
    });

    toolsList.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-remove-tool]");
      if (!button) return;
      tools.splice(Number(button.dataset.removeTool), 1);
      renderTools();
      renderPreview();
    });

    screenshotsList.addEventListener("input", (event) => {
      const index = Number(event.target.dataset.screenshotIndex);
      const field = event.target.dataset.screenshotField;
      if (!Number.isNaN(index) && field) {
        screenshots[index][field] = event.target.value;
        renderPreview();
      }
    });

    screenshotsList.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-remove-screenshot]");
      if (!button) return;
      screenshots.splice(Number(button.dataset.removeScreenshot), 1);
      renderScreenshots();
      renderPreview();
    });

    writeupList.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-record-id]");
      if (!button) return;
      const record = records.find((item) => item.id === button.dataset.recordId);
      if (record) loadRecord(record);
    });

    document.querySelector("#addToolBtn").addEventListener("click", () => {
      tools.push({ tool: "", purpose: "" });
      renderTools();
      renderPreview();
    });

    document.querySelector("#addScreenshotBtn").addEventListener("click", () => {
      screenshots.push({ file: "", caption: "", alt: "" });
      renderScreenshots();
      renderPreview();
    });

    document.querySelector("#newBtn").addEventListener("click", resetForm);
    document.querySelector("#saveBtn").addEventListener("click", saveRecord);
    document.querySelector("#deleteBtn").addEventListener("click", deleteRecord);
    document.querySelector("#copyBtn").addEventListener("click", copyMarkdown);
    document.querySelector("#downloadBtn").addEventListener("click", downloadMarkdown);

    renderTools();
    renderScreenshots();
    renderList();
    renderPreview();
  </script>
</body>
</html>
